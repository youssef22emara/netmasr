<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netra - إرسال شكوى</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .submit-section {
            padding: 120px 0 60px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .form-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-heading);
            color: var(--text-white);
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            border-radius: 8px;
            font-family: var(--font-body);
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(108, 77, 255, 0.2);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }
        .result-box {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            background-color: rgba(108, 77, 255, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 12px;
            text-align: center;
        }
        .result-box h3 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Netra</a>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="track.html">تتبع شكواك</a>
            </nav>
        </div>
    </header>

    <section class="submit-section">
        <div class="container">
            <div class="form-container fade-up visible">
                <div class="section-title text-center">
                    <h2>سجّل مشكلتك</h2>
                    <p>يرجى تعبئة النموذج بدقة لضمان تسجيل الشكوى بأسرع وقت، وسيتم إعطاؤك رقم تتبع.</p>
                </div>
                <form id="complaintForm">
                    <div class="form-group">
                        <label for="fullName">الاسم بالكامل (اختياري)</label>
                        <input type="text" id="fullName" name="fullName" class="form-control" placeholder="أدخل اسمك">
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">رقم الهاتف (اختياري)</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control" placeholder="أدخل رقم الهاتف">
                    </div>
                    <div class="form-group">
                        <label for="governorate">المحافظة *</label>
                        <select id="governorate" name="governorate" class="form-control" required>
                            <option value="" disabled selected>اختر محافظتك</option>
                            <option value="Cairo">القاهرة</option>
                            <option value="Giza">الجيزة</option>
                            <option value="Alexandria">الإسكندرية</option>
                            <option value="Other">أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="company">شركة الإنترنت *</label>
                        <select id="company" name="company" class="form-control" required>
                            <option value="" disabled selected>اختر الشركة</option>
                            <option value="WE">WE</option>
                            <option value="Vodafone">Vodafone</option>
                            <option value="Orange">Orange</option>
                            <option value="Etisalat">Etisalat</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">نوع الشكوى *</label>
                        <select id="type" name="type" class="form-control" required>
                            <option value="" disabled selected>اختر نوع المشكلة</option>
                            <option value="Speed Issue">مشكلة في السرعة</option>
                            <option value="Data Limit Issue">نفاذ باقة الإنترنت</option>
                            <option value="Disconnection">انقطاع متكرر للخدمة</option>
                            <option value="Other">أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">تفاصيل الشكوى *</label>
                        <textarea id="description" name="description" class="form-control" rows="4" required placeholder="اشرح مشكلتك بوضوح..."></textarea>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="refusedNumber" name="refusedNumber">
                        <label for="refusedNumber">تم رفض إعطائي رقم شكوى من خدمة العملاء التابعة للشركة</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%">إرسال الشكوى</button>
                </form>

                <div id="resultBox" class="result-box">
                    <p>تم استلام طلبك بنجاح. يرجى الاحتفاظ برقم التتبع الخاص بك:</p>
                    <h3 id="trackingIdDisplay">NETRA-YYYY-XXXX</h3>
                    <a href="track.html" class="btn btn-outline" style="margin-top:1rem">تتبع الشكوى الآن</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="padding-top:0; border-top:none; text-align:center;">
                <p>&copy; 2026 Netra Platform.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'جاري الإرسال...';
            btn.disabled = true;

            const data = {
                fullName: document.getElementById('fullName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                governorate: document.getElementById('governorate').value,
                company: document.getElementById('company').value,
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                refusedNumber: document.getElementById('refusedNumber').checked
            };

            const result = await NetraAPI.submitComplaint(data);
            btn.innerText = originalText;
            btn.disabled = false;

            if (result && result.success) {
                document.getElementById('complaintForm').style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('trackingIdDisplay').innerText = result.trackingId;
            } else {
                alert('حدث خطأ أثناء إرسال الشكوى. يرجى التأكد من تشغيل الخادم.');
            }
        });
    </script>
</body>
</html>
